name: MTPRO v0.33.0 Binance Demo Canary Validation

on:
  workflow_dispatch:
    inputs:
      product:
        description: Binance Demo product
        required: true
        type: choice
        options:
          - spot
          - usdsPerpetual
      symbol:
        description: Uppercase Binance symbol
        required: true
        default: BTCUSDT
        type: string
      side:
        description: LIMIT order side
        required: true
        type: choice
        options:
          - BUY
          - SELL
      price_minor_units:
        description: Quote price in minor units (2 decimals)
        required: true
        type: string
      quantity_atomic_units:
        description: Base quantity in atomic units
        required: true
        type: string
      base_asset_scale:
        description: Base asset decimal scale
        required: true
        default: "8"
        type: string
      notional_cap_minor_units:
        description: Maximum Demo notional in quote minor units
        required: true
        type: string
      leverage_basis_points:
        description: 10000 for 1x, maximum 20000 for 2x
        required: true
        default: "10000"
        type: string
      confirmation:
        description: Type CONFIRM_BINANCE_DEMO_ONLY
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: mtpro-v0330-binance-demo-canary
  cancel-in-progress: false

jobs:
  demo-canary:
    if: ${{ inputs.confirmation == 'CONFIRM_BINANCE_DEMO_ONLY' }}
    runs-on: macos-14
    environment: binance-demo
    timeout-minutes: 20
    env:
      MTPRO_BINANCE_DEMO_API_KEY: ${{ secrets.MTPRO_BINANCE_DEMO_API_KEY }}
      MTPRO_BINANCE_DEMO_SECRET_KEY: ${{ secrets.MTPRO_BINANCE_DEMO_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Prepare Demo-only one-shot configuration
        env:
          DEMO_PRODUCT: ${{ inputs.product }}
          DEMO_SYMBOL: ${{ inputs.symbol }}
          DEMO_SIDE: ${{ inputs.side }}
          DEMO_PRICE_MINOR_UNITS: ${{ inputs.price_minor_units }}
          DEMO_QUANTITY_ATOMIC_UNITS: ${{ inputs.quantity_atomic_units }}
          DEMO_BASE_ASSET_SCALE: ${{ inputs.base_asset_scale }}
          DEMO_NOTIONAL_CAP_MINOR_UNITS: ${{ inputs.notional_cap_minor_units }}
          DEMO_LEVERAGE_BASIS_POINTS: ${{ inputs.leverage_basis_points }}
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/v0330-demo-evidence"
          swift run mtpro v0.33-demo-canary-prepare \
            "$DEMO_PRODUCT" \
            "$DEMO_SYMBOL" \
            "$DEMO_SIDE" \
            "$DEMO_PRICE_MINOR_UNITS" \
            "$DEMO_QUANTITY_ATOMIC_UNITS" \
            "$DEMO_BASE_ASSET_SCALE" \
            "$DEMO_NOTIONAL_CAP_MINOR_UNITS" \
            "$DEMO_LEVERAGE_BASIS_POINTS" \
            "$RUNNER_TEMP/v0330-demo-evidence" \
            "$RUNNER_TEMP/v0330-demo-config.json" \
            "$GITHUB_SHA" \
            CONFIRM_BINANCE_DEMO_ONLY

      - name: Execute Demo submit status cancel
        run: |
          set -euo pipefail
          swift run mtpro v0.33-demo-canary \
            "$RUNNER_TEMP/v0330-demo-config.json" \
            CONFIRM_BINANCE_DEMO_ONLY

      - name: Assert Demo-only redacted evidence
        run: |
          set -euo pipefail
          test -n "$(find "$RUNNER_TEMP/v0330-demo-evidence" -type f -name '*.json' -print -quit)"
          ! grep -R -F "$MTPRO_BINANCE_DEMO_API_KEY" "$RUNNER_TEMP/v0330-demo-evidence"
          ! grep -R -F "$MTPRO_BINANCE_DEMO_SECRET_KEY" "$RUNNER_TEMP/v0330-demo-evidence"
          grep -R -F '"environment":"demo"' "$RUNNER_TEMP/v0330-demo-evidence"
          ! grep -R -E '"endpointHost":"(api|fapi)\\.binance\\.com"' "$RUNNER_TEMP/v0330-demo-evidence"

      - name: Upload redacted Demo evidence
        uses: actions/upload-artifact@v4
        with:
          name: v0330-${{ inputs.product }}-demo-evidence-${{ github.run_id }}
          path: ${{ runner.temp }}/v0330-demo-evidence
          if-no-files-found: error
          retention-days: 30
