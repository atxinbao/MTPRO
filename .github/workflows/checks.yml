name: AEP Checks

# CI-PR-FAST-LANE-RELEASE-MATRIX
# CI-PR-FAST-LANE-REQUIRED-CHECKS
# CI-RELEASE-FULL-LINUX-MACOS-MATRIX
# GH-1201-VERIFY-V0181-RELEASE-FULL-MATRIX-PUBLICATION-GATE
# TVM-RELEASE-V0181-RELEASE-FULL-MATRIX-PUBLICATION-GATE
# V0181-002-RELEASE-FULL-MATRIX-REQUIRED
# V0181-002-LINUX-CHECKS-JOB-EVIDENCE
# V0181-002-DASHBOARD-MACOS-JOB-EVIDENCE
# V0181-002-PR-FAST-NOT-PUBLICATION-EVIDENCE
# V0181-002-NO-PRODUCTION-CUTOVER
# GH-1519-VERIFY-V0321-ACCEPTANCE-SEMANTICS-PUBLICATION-FACTS
# GH-1520-VERIFY-V0321-EVIDENCE-ROOT-MANIFEST-SHA256
# GH-1521-VERIFY-V0321-APPROVAL-SCOPE-RUN-LOCK
# GH-1522-VERIFY-V0321-CAP-VALIDATION-NEGATIVE-MATRIX
# GH-1523-VERIFY-V0321-UNIQUE-SPOT-FUTURES-ARTIFACT-SETS
# GH-1524-VERIFY-V0321-OMS-RECONCILIATION-ROLLBACK-INCIDENT-LINKAGE
# GH-1525-VERIFY-V0321-FULL-MATRIX-BEFORE-RELEASE
# GH-1526-VERIFY-V0321-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
# TVM-RELEASE-V0321-CONTROLLED-CANARY-INTEGRITY-PUBLICATION-GATE-REPAIR
# V0321-001-ACCEPTANCE-SEMANTICS-PUBLICATION-FACTS
# V0321-002-EVIDENCE-ROOT-MANIFEST-SHA256
# V0321-003-APPROVAL-SCOPE-RUN-LOCK
# V0321-004-CAP-VALIDATION-NEGATIVE-MATRIX
# V0321-005-UNIQUE-SPOT-FUTURES-ARTIFACT-SETS
# V0321-006-OMS-RECONCILIATION-ROLLBACK-INCIDENT-LINKAGE
# V0321-007-FULL-MATRIX-BEFORE-RELEASE
# V0321-008-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
# GH-1528-VERIFY-V0322-RELEASE-CREATION-BEHIND-FULL-MATRIX
# GH-1529-VERIFY-V0322-TRUSTED-PROVENANCE-DERIVED-OBSERVED-CANARY
# GH-1530-VERIFY-V0322-COMMIT-CLOCK-APPROVAL-FRESHNESS
# GH-1531-VERIFY-V0322-ATOMIC-RUN-LOCK-REPLAY-REGISTRY
# GH-1532-VERIFY-V0322-SEMANTIC-OMS-ROLLBACK-INCIDENT-LINKAGE
# GH-1533-VERIFY-V0322-NEGATIVE-MATRIX-BACKEND-CLOSURE-INPUT
# TVM-RELEASE-V0322-CONTROLLED-CANARY-INTEGRITY-CLOSURE-PATCH
# V0322-001-RELEASE-CREATION-BEHIND-FULL-MATRIX
# V0322-002-TRUSTED-PROVENANCE-DERIVED-OBSERVED-CANARY
# V0322-003-COMMIT-CLOCK-APPROVAL-FRESHNESS
# V0322-004-ATOMIC-RUN-LOCK-REPLAY-REGISTRY
# V0322-005-SEMANTIC-OMS-ROLLBACK-INCIDENT-LINKAGE
# V0322-006-NEGATIVE-MATRIX-BACKEND-CLOSURE-INPUT
# CI-NO-PRODUCTION-CUTOVER

permissions:
  contents: read

concurrency:
  group: mtpro-checks-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
  push:
    branches:
      - "release/**"
    tags:
      - "v*"

jobs:
  pr_fast_checks:
    name: pr-fast-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      MTPRO_CI_SWIFT_VERSION_FAMILY: "6.3.x"
      MTPRO_CI_SWIFT_VERSION_REGEX: "Swift version 6\\.3(\\.| )"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify runner-pinned Swift toolchain
        run: |
          echo "MTPRO PR fast lane policy: ubuntu-24.04 must provide Swift ${MTPRO_CI_SWIFT_VERSION_FAMILY}."
          swift --version
          swift --version | grep -E "${MTPRO_CI_SWIFT_VERSION_REGEX}"

      - name: Install sqlite3 development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Check whitespace
        run: git diff --check

      - name: Run automation readiness
        run: bash checks/automation-readiness.sh

      - name: Verify PR fast lane / release full matrix policy
        run: bash checks/verify-ci-pr-fast-lane-release-matrix.sh

      - name: Verify v0.33 backend maintenance cross-platform contract
        run: bash checks/verify-v0.33.0-backend-maintenance-ci.sh

  linux_checks:
    name: linux-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/') }}
    env:
      MTPRO_CI_SWIFT_VERSION_FAMILY: "6.3.x"
      MTPRO_CI_SWIFT_VERSION_REGEX: "Swift version 6\\.3(\\.| )"

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify runner-pinned Swift toolchain
        run: |
          echo "MTPRO runner-pinned Swift toolchain policy: ubuntu-24.04 must provide Swift ${MTPRO_CI_SWIFT_VERSION_FAMILY}."
          swift --version
          swift --version | grep -E "${MTPRO_CI_SWIFT_VERSION_REGEX}"

      - name: Install sqlite3 development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Check whitespace
        run: git diff --check

      - name: Run MTPRO checks
        run: bash checks/run.sh

  dashboard_macos:
    name: dashboard-macos
    runs-on: macos-15
    timeout-minutes: 45
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/') }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Verify macOS Dashboard Swift toolchain
        run: |
          echo "MTPRO macOS Dashboard validation policy: required checks must build and smoke the SwiftUI Dashboard on macOS with Swift 6.x."
          swift --version
          swift --version | grep -E "Swift version 6\\."

      - name: Check whitespace
        run: git diff --check

      - name: Verify v0.5.0 boundary preflight guard
        run: bash checks/verify-v0.5.0-preflight.sh

      - name: Verify v0.7.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.7.0-dashboard-macos-guards.sh

      - name: Verify v0.8.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.8.1-dashboard-macos-v080-guards.sh

      - name: Verify v0.9.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.9.1-dashboard-macos-v090-guards.sh

      - name: Verify v0.10.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.10.1-dashboard-macos-v0100-guards.sh

      - name: Verify v0.11.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.11.1-dashboard-macos-v0110-guards.sh

      - name: Verify v0.12.0 Dashboard macOS focused guards
        run: bash checks/verify-v0.12.0-dashboard-macos-guards.sh

      - name: Verify v0.14.x release CI and Dashboard evidence guards
        run: bash checks/verify-v0.14.1-release-ci-dashboard-evidence.sh

      - name: Build Dashboard
        run: swift build --product Dashboard

      - name: Run Dashboard smoke
        run: DASHBOARD_SMOKE=1 swift run Dashboard

  release_publication_checks:
    name: release-publication-checks
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: write
    needs:
      - pr_fast_checks
      - linux_checks
      - dashboard_macos
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/heads/release/')) }}

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Aggregate release publication matrix evidence
        run: |
          # GH-1201-VERIFY-V0181-RELEASE-FULL-MATRIX-PUBLICATION-GATE
          # TVM-RELEASE-V0181-RELEASE-FULL-MATRIX-PUBLICATION-GATE
          # V0181-002-RELEASE-FULL-MATRIX-REQUIRED
          # V0181-002-LINUX-CHECKS-JOB-EVIDENCE
          # V0181-002-DASHBOARD-MACOS-JOB-EVIDENCE
          # V0181-002-PR-FAST-NOT-PUBLICATION-EVIDENCE
          # V0181-002-NO-PRODUCTION-CUTOVER
          # GH-1499-VERIFY-V0311-RELEASE-PUBLICATION-GATE
          # TVM-RELEASE-V0311-CONTROLLED-ENABLEMENT-INTEGRITY-REPAIR
          # V0311-001-RELEASE-PUBLICATION-AFTER-FULL-MATRIX
          # GH-1525-VERIFY-V0321-FULL-MATRIX-BEFORE-RELEASE
          # GH-1526-VERIFY-V0321-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
          # TVM-RELEASE-V0321-CONTROLLED-CANARY-INTEGRITY-PUBLICATION-GATE-REPAIR
          # V0321-007-FULL-MATRIX-BEFORE-RELEASE
          # V0321-008-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
          # GH-1528-VERIFY-V0322-RELEASE-CREATION-BEHIND-FULL-MATRIX
          # GH-1529-VERIFY-V0322-TRUSTED-PROVENANCE-DERIVED-OBSERVED-CANARY
          # GH-1530-VERIFY-V0322-COMMIT-CLOCK-APPROVAL-FRESHNESS
          # GH-1531-VERIFY-V0322-ATOMIC-RUN-LOCK-REPLAY-REGISTRY
          # GH-1532-VERIFY-V0322-SEMANTIC-OMS-ROLLBACK-INCIDENT-LINKAGE
          # GH-1533-VERIFY-V0322-NEGATIVE-MATRIX-BACKEND-CLOSURE-INPUT
          # TVM-RELEASE-V0322-CONTROLLED-CANARY-INTEGRITY-CLOSURE-PATCH
          # V0322-001-RELEASE-CREATION-BEHIND-FULL-MATRIX
          # V0322-002-TRUSTED-PROVENANCE-DERIVED-OBSERVED-CANARY
          # V0322-003-COMMIT-CLOCK-APPROVAL-FRESHNESS
          # V0322-004-ATOMIC-RUN-LOCK-REPLAY-REGISTRY
          # V0322-005-SEMANTIC-OMS-ROLLBACK-INCIDENT-LINKAGE
          # V0322-006-NEGATIVE-MATRIX-BACKEND-CLOSURE-INPUT
          # GH-1541-CLOSE-V0323-STAGE-AUDIT-RELEASE-NOTES
          # TVM-RELEASE-V0323-CONTROLLED-CANARY-PERSISTENT-EVIDENCE-INTEGRITY-REPAIR
          # V0323-007-STAGE-AUDIT-RELEASE-NOTES
          # V0323-007-BACKEND-CLOSURE-BLOCKED
          # V0323-007-BINANCE-SPOT-USDM-FUTURES-ONLY
          # V0323-007-V0330-BLOCKED-UNTIL-V0323-PUBLISHED
          # V0323-007-NO-PRODUCTION-CUTOVER
          echo "MTPRO release publication matrix: workflow=${{ github.workflow }} run_id=${{ github.run_id }} run_attempt=${{ github.run_attempt }}"
          echo "MTPRO release publication workflow job ids: pr_fast_checks linux_checks dashboard_macos release_publication_checks"
          echo "MTPRO release publication job results: pr-fast-checks=${{ needs.pr_fast_checks.result }} linux-checks=${{ needs.linux_checks.result }} dashboard-macos=${{ needs.dashboard_macos.result }}"
          echo "MTPRO release publication aggregate: release-publication-checks=requires-full-matrix-before-release"
          echo "MTPRO release publication evidence artifacts: GitHub Actions run log, job summary, linux checks/run.sh output, dashboard macOS build/smoke output"
          {
            echo "### MTPRO release publication matrix evidence"
            echo "- workflow: ${{ github.workflow }}"
            echo "- run_id: ${{ github.run_id }}"
            echo "- run_attempt: ${{ github.run_attempt }}"
            echo "- job ids: pr_fast_checks, linux_checks, dashboard_macos, release_publication_checks"
            echo "- results: pr-fast-checks=${{ needs.pr_fast_checks.result }}, linux-checks=${{ needs.linux_checks.result }}, dashboard-macos=${{ needs.dashboard_macos.result }}"
            echo "- artifacts: GitHub Actions run log, job summary, linux checks/run.sh output, dashboard macOS build/smoke output"
          } >> "$GITHUB_STEP_SUMMARY"
          test "${{ needs.pr_fast_checks.result }}" = "success"
          test "${{ needs.linux_checks.result }}" = "success"
          test "${{ needs.dashboard_macos.result }}" = "success"

      - name: Publish v0.32.2 release after full matrix
        if: ${{ github.event_name == 'push' && github.ref == 'refs/tags/v0.32.2' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GH-1528-VERIFY-V0322-RELEASE-CREATION-BEHIND-FULL-MATRIX
          # TVM-RELEASE-V0322-CONTROLLED-CANARY-INTEGRITY-CLOSURE-PATCH
          # V0322-001-RELEASE-CREATION-BEHIND-FULL-MATRIX
          notes="docs/release/mtpro-release-v0.32.2-controlled-canary-integrity-closure-patch-notes.md"
          test -f "$notes"
          if gh release view "v0.32.2" >/dev/null 2>&1; then
            echo "MTPRO v0.32.2 release already exists after full matrix; not recreating."
          else
            gh release create "v0.32.2" \
              --target "${GITHUB_SHA}" \
              --title "MTPRO v0.32.2 Controlled Canary Integrity Closure Patch" \
              --notes-file "$notes"
          fi

      - name: Publish v0.32.3 release after full matrix
        if: ${{ github.event_name == 'push' && github.ref == 'refs/tags/v0.32.3' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # GH-1541-CLOSE-V0323-STAGE-AUDIT-RELEASE-NOTES
          # TVM-RELEASE-V0323-CONTROLLED-CANARY-PERSISTENT-EVIDENCE-INTEGRITY-REPAIR
          # V0323-007-STAGE-AUDIT-RELEASE-NOTES
          # V0323-007-BACKEND-CLOSURE-BLOCKED
          # V0323-007-BINANCE-SPOT-USDM-FUTURES-ONLY
          # V0323-007-V0330-BLOCKED-UNTIL-V0323-PUBLISHED
          # V0323-007-NO-PRODUCTION-CUTOVER
          notes="docs/release/mtpro-release-v0.32.3-controlled-canary-persistent-evidence-integrity-repair-notes.md"
          test -f "$notes"
          if gh release view "v0.32.3" >/dev/null 2>&1; then
            echo "MTPRO v0.32.3 release already exists after full matrix; not recreating."
          else
            gh release create "v0.32.3" \
              --target "${GITHUB_SHA}" \
              --title "MTPRO v0.32.3 Controlled Canary Persistent Evidence Integrity Repair" \
              --notes-file "$notes"
          fi

  checks:
    name: checks
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    if: ${{ always() }}
    needs:
      - pr_fast_checks
      - linux_checks
      - dashboard_macos
      - release_publication_checks

    steps:
      - name: Aggregate required checks
        run: |
          # GH-1519-VERIFY-V0321-ACCEPTANCE-SEMANTICS-PUBLICATION-FACTS
          # GH-1520-VERIFY-V0321-EVIDENCE-ROOT-MANIFEST-SHA256
          # GH-1521-VERIFY-V0321-APPROVAL-SCOPE-RUN-LOCK
          # GH-1522-VERIFY-V0321-CAP-VALIDATION-NEGATIVE-MATRIX
          # GH-1523-VERIFY-V0321-UNIQUE-SPOT-FUTURES-ARTIFACT-SETS
          # GH-1524-VERIFY-V0321-OMS-RECONCILIATION-ROLLBACK-INCIDENT-LINKAGE
          # GH-1525-VERIFY-V0321-FULL-MATRIX-BEFORE-RELEASE
          # GH-1526-VERIFY-V0321-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
          # TVM-RELEASE-V0321-CONTROLLED-CANARY-INTEGRITY-PUBLICATION-GATE-REPAIR
          # V0321-001-ACCEPTANCE-SEMANTICS-PUBLICATION-FACTS
          # V0321-002-EVIDENCE-ROOT-MANIFEST-SHA256
          # V0321-003-APPROVAL-SCOPE-RUN-LOCK
          # V0321-004-CAP-VALIDATION-NEGATIVE-MATRIX
          # V0321-005-UNIQUE-SPOT-FUTURES-ARTIFACT-SETS
          # V0321-006-OMS-RECONCILIATION-ROLLBACK-INCIDENT-LINKAGE
          # V0321-007-FULL-MATRIX-BEFORE-RELEASE
          # V0321-008-AGGREGATE-STAGE-AUDIT-RELEASE-DOCS
          echo "MTPRO required checks aggregate: event=${{ github.event_name }} pr-fast-checks=${{ needs.pr_fast_checks.result }} linux-checks=${{ needs.linux_checks.result }} dashboard-macos=${{ needs.dashboard_macos.result }} release-publication-checks=${{ needs.release_publication_checks.result }}"
          test "${{ needs.pr_fast_checks.result }}" = "success"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            test "${{ needs.linux_checks.result }}" = "skipped"
            test "${{ needs.dashboard_macos.result }}" = "skipped"
            test "${{ needs.release_publication_checks.result }}" = "skipped"
          else
            test "${{ needs.linux_checks.result }}" = "success"
            test "${{ needs.dashboard_macos.result }}" = "success"
            test "${{ needs.release_publication_checks.result }}" = "success"
          fi
