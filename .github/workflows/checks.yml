name: AEP Checks

on:
  pull_request:
    branches:
      - main

jobs:
  checks:
    name: checks
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Verify Swift toolchain
        run: |
          swift --version
          swift --version | grep -E "Swift version 6\\.3(\\.| )"

      - name: Install sqlite3 development headers
        run: |
          sudo apt-get update
          sudo apt-get install -y libsqlite3-dev

      - name: Check whitespace
        run: git diff --check

      - name: Run MTPRO checks
        run: bash checks/run.sh
